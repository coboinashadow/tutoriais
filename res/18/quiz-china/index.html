function shuffleArrayInPlace(array){
	currentIndex=array.length;
	while(currentIndex!=0){
		randomIndex=parseInt(Math.random()*currentIndex);
		currentIndex--;
		[array[currentIndex],array[randomIndex]]=[array[randomIndex],array[currentIndex]];
	}
	return array;
}
function pergunta(){
	item=questions[parseInt(Math.random()*questions.length)];
	document.body.innerHTML="<div id=wrapper><div class=question-card style='animation:entrada"+parseInt(Math.random()*8)+"1s;'><div id=enunciado>"+item.q+"</div><div id=options></div><div id=hint style='display:none;'><br><b>DICA RESPOSTA</b><br>"+item.t+"</div><div id=reload onclick='pergunta();'>Outra pergunta<br>atalho: \"P\"</div></div>";
	optDiv=document.getElementById('options');
	gabarito="";
	alternativas=[];
	item.a.forEach((opt,i)=>{
		alternativas.push([opt,i==item.c]);
	});
	shuffleArrayInPlace(alternativas);
	alternativas.forEach((opt,i)=>{
		optDiv.innerHTML+="<button onclick='resposta();'>"+opt[0]+"</button>";
		gabarito+="<button class="+(opt[1]?"correct":"wrong")+">"+opt[0]+"</button>";
	});
};
function resposta(){
	document.getElementById('hint').style.display='';
	optDiv.innerHTML=gabarito;
};
pergunta();
